name: pfpfp

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ---------------------------------------------------------
    # Install Brave Browser
    # ---------------------------------------------------------
    - name: Install Brave Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y apt-transport-https curl
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" | \
          sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt-get update
        sudo apt-get install -y brave-browser
      shell: bash

    # ---------------------------------------------------------
    # Install Cloudflare WARP
    # ---------------------------------------------------------
    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | \
          sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | \
          sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    - name: Ensure WARP is active
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"
      shell: bash

    # ---------------------------------------------------------
    # Locale setup
    # ---------------------------------------------------------
    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale

    # ---------------------------------------------------------
    # Install Python dependencies
    # ---------------------------------------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    # ---------------------------------------------------------
    # SAFE TEST STEPS (won't break workflow)
    # ---------------------------------------------------------
    - name: Test Python environment
      run: |
        python - << 'EOF'
        import sys
        print("Python version:", sys.version)
        EOF

    - name: Test Brave installation
      run: |
        brave-browser --version || echo "Brave not found"

    - name: Test SeleniumBase import
      run: |
        python - << 'EOF'
        import seleniumbase
        print("SeleniumBase OK")
        EOF

    - name: Test chromedriver presence
      run: |
        which chromedriver || echo "chromedriver missing"

    # ---------------------------------------------------------
    # MAIN EXECUTION
    # ---------------------------------------------------------
    - name: Run python ff.py
      run: |
        python ff.py --brave --incognito --do-not-track --xvfb --screenshot


